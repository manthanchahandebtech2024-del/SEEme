services:
  - type: web
    name: seeme
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: "file:./prisma/seeme.db"
      - key: JWT_SECRET
        generateValue: true
      - key: AI_PROVIDER
        value: local
      - key: CORS_ORIGIN
        value: "*"
